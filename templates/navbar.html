<header class="sticky top-0 z-50 border-b border-black/10 bg-[#eadfce]/95 text-black shadow-sm backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-5 px-4 py-4 sm:px-6 lg:px-8">
        <a href="{% url 'home' %}" class="flex items-center gap-3">
            <span class="flex h-14 w-14 items-center justify-center overflow-hidden rounded-md bg-white ring-1 ring-black/10">
                <img src="/static/img/logoUNICONNET.jpeg" alt="UNICONNET" class="h-full w-full object-contain">
            </span>
            <span class="font-serif text-3xl font-black tracking-normal text-black">UNICONNET</span>
        </a>

        <nav class="hidden items-center gap-7 text-sm font-bold text-[#34261e] lg:flex">
            <a href="{% url 'home' %}#servicios" class="hover:text-black">Servicios</a>
            <a href="{% url 'home' %}#productos" class="hover:text-black">Productos</a>
            <a href="{% url 'home' %}#beneficios" class="hover:text-black">Beneficios</a>
            <a href="{% url 'home' %}#modelo" class="hover:text-black">Modelo</a>
            <a href="{% url 'home' %}#crecimiento" class="hover:text-black">Escala</a>
        </nav>

        <div class="flex items-center gap-3 text-sm font-semibold">
            {% if request.user.is_authenticated %}
            <a href="{% url 'users:user_panel' %}" class="hidden rounded-full border border-black/15 bg-white/60 px-5 py-2 text-black transition hover:bg-white sm:inline-flex">
                {{ request.user.first_name|default:request.user.email }}
            </a>
            <a href="{% url 'users:logout' %}" class="rounded-full bg-black px-5 py-2 text-white transition hover:bg-[#2a211b]">Salir</a>
            {% else %}
            <a href="{% url 'users:login' %}" class="hidden rounded-full border border-black/15 bg-white/60 px-5 py-2 text-black transition hover:bg-white sm:inline-flex">Iniciar sesion</a>
            {% endif %}
            <a href="#publicaciones" class="rounded-full bg-black px-5 py-2 text-white transition hover:bg-[#2a211b]">Reservar</a>
        </div>
    </div>
</header>
