<header class="sticky top-0 z-50 border-b border-blue-900/30 bg-slate-950 text-white shadow-lg">
    <div class="bg-gradient-to-r from-blue-950 via-blue-800 to-cyan-700">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <a href="{% url 'home' %}" class="flex items-center justify-center gap-3 md:justify-start">
                    <span class="flex h-12 w-12 items-center justify-center rounded-md bg-white text-lg font-black text-blue-800 shadow-md">MC</span>
                    <span class="text-2xl font-bold leading-tight tracking-normal text-white md:text-3xl">MarketPlace Continental</span>
                </a>

                <div class="flex items-center justify-center gap-3 text-sm font-semibold md:justify-end">
                    {% if request.user.is_authenticated %}
                    <a href="{% url 'users:user_panel' %}" class="rounded-md bg-white/10 px-4 py-2 text-white ring-1 ring-white/20 transition hover:bg-white/20">
                        {{ request.user.first_name|default:request.user.email }}
                    </a>
                    <a href="{% url 'users:logout' %}" class="rounded-md bg-cyan-300 px-4 py-2 text-blue-950 transition hover:bg-white">Salir</a>
                    {% else %}
                    <a href="{% url 'users:login' %}" class="rounded-md bg-white/10 px-4 py-2 text-white ring-1 ring-white/20 transition hover:bg-white/20">Ingresar</a>
                    {% endif %}
                    <a href="{% url 'shopping_cart:home' %}" class="rounded-md bg-cyan-300 px-4 py-2 text-blue-950 transition hover:bg-white">Carrito</a>
                </div>
            </div>

            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <form action="{% url 'home' %}" class="flex min-h-12 w-full overflow-hidden rounded-md bg-white shadow-md ring-1 ring-white/30 lg:max-w-xl">
                    <input id="search" name="q" value="{{ query|default:'' }}" class="min-w-0 flex-1 px-4 text-gray-900 outline-none" type="search" placeholder="Buscar tecnologia, moda, libros...">
                    <button class="bg-cyan-400 px-5 font-bold text-blue-950 transition hover:bg-cyan-300" type="submit">Buscar</button>
                </form>

                <nav class="flex gap-2 overflow-x-auto pb-1 text-sm font-semibold">
                    <a class="whitespace-nowrap rounded-md bg-white/10 px-3 py-2 text-white ring-1 ring-white/15 transition hover:bg-white hover:text-blue-900" href="{% url 'home' %}">Todo</a>
                    {% for i in menu_categories %}
                    <a class="whitespace-nowrap rounded-md bg-white/10 px-3 py-2 text-white ring-1 ring-white/15 transition hover:bg-white hover:text-blue-900" href="{% url 'home' %}?category={{ i.slug }}">{{ i.title }}</a>
                    {% endfor %}
                </nav>
            </div>
        </div>
    </div>
</header>
